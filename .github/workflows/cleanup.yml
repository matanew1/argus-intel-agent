name: DB Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'    # Sunday at 3am UTC
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install minimal dependencies
        run: pip install sqlalchemy psycopg2-binary python-dotenv

      - name: Prune run_log entries older than 90 days
        run: |
          python - <<'EOF'
          import os
          from datetime import datetime, timedelta
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"])
          cutoff = datetime.utcnow() - timedelta(days=90)
          with engine.connect() as conn:
              result = conn.execute(
                  text("DELETE FROM run_log WHERE trigger_time < :cutoff"),
                  {"cutoff": cutoff},
              )
              conn.commit()
              print(f"Deleted {result.rowcount} old run_log rows (cutoff: {cutoff.date()})")
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
