version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://argus:argus@db:5432/argus
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml   # hot-reload from host
      - ./credentials:/app/credentials:ro

volumes:
  pgdata:
